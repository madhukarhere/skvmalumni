<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#64b5f6"/>
      <stop offset="55%" stop-color="#1976d2"/>
      <stop offset="100%" stop-color="#0d47a1"/>
    </radialGradient>
    <!-- Clip to circle -->
    <clipPath id="circle-clip">
      <circle cx="100" cy="100" r="84"/>
    </clipPath>
  </defs>

  <!-- Outer gold ring -->
  <circle cx="100" cy="100" r="99" fill="#c8a84b"/>
  <!-- White spacer -->
  <circle cx="100" cy="100" r="94" fill="#fff"/>
  <!-- Decorative dashed ring -->
  <circle cx="100" cy="100" r="91" fill="none" stroke="#c8a84b" stroke-width="1.5" stroke-dasharray="4 3.5"/>
  <!-- Main blue fill -->
  <circle cx="100" cy="100" r="86" fill="url(#bg)"/>

  <!-- Inner gold accent ring -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="rgba(200,168,75,0.6)" stroke-width="1"/>

  <!-- Curved top text: SRIKRISHNA VIDYA MANDIR -->
  <path id="arc-top" d="M 24,100 A 76,76 0 0,1 176,100" fill="none"/>
  <text font-family="'Trebuchet MS',Arial,sans-serif" font-size="11" font-weight="700"
        fill="#c8a84b" letter-spacing="1.5">
    <textPath href="#arc-top" startOffset="4%">SRIKRISHNA VIDYA MANDIR</textPath>
  </text>

  <!-- Curved bottom text: ALUMNI -->
  <path id="arc-bot" d="M 40,138 A 70,70 0 0,0 160,138" fill="none"/>
  <text font-family="'Trebuchet MS',Arial,sans-serif" font-size="12" font-weight="800"
        fill="#c8a84b" letter-spacing="5">
    <textPath href="#arc-bot" startOffset="16%">ALUMNI</textPath>
  </text>

  <!-- Horizontal separator lines flanking bottom text -->
  <line x1="38" y1="152" x2="58" y2="152" stroke="#c8a84b" stroke-width="1.2"/>
  <line x1="142" y1="152" x2="162" y2="152" stroke="#c8a84b" stroke-width="1.2"/>

  <!-- Center diya (oil lamp) flame -->
  <ellipse cx="100" cy="70" rx="5" ry="8" fill="#f9a825"/>
  <ellipse cx="100" cy="72" rx="3" ry="5" fill="#fff9c4"/>
  <!-- Lamp bowl -->
  <path d="M88,82 Q100,76 112,82 Q110,92 100,94 Q90,92 88,82 Z" fill="#c8a84b"/>
  <!-- Lamp handle/stand -->
  <rect x="98" y="93" width="4" height="8" rx="1" fill="#c8a84b"/>
  <rect x="93" y="100" width="14" height="3" rx="1.5" fill="#c8a84b"/>

  <!-- Open book below lamp -->
  <g transform="translate(100,118)">
    <!-- Left page -->
    <path d="M-22,-8 C-20,-13 -12,-14 -2,-13 L-2,11 C-12,10 -20,9 -22,5 Z"
          fill="rgba(255,255,255,0.92)" stroke="#c8a84b" stroke-width="0.8"/>
    <!-- Right page -->
    <path d="M22,-8 C20,-13 12,-14 2,-13 L2,11 C12,10 20,9 22,5 Z"
          fill="rgba(255,255,255,0.92)" stroke="#c8a84b" stroke-width="0.8"/>
    <!-- Spine -->
    <line x1="0" y1="-13" x2="0" y2="11" stroke="#c8a84b" stroke-width="2"/>
    <!-- Text lines on pages -->
    <line x1="-18" y1="-5" x2="-4" y2="-6" stroke="rgba(13,71,161,0.5)" stroke-width="1"/>
    <line x1="-18" y1="0"  x2="-4" y2="-1"  stroke="rgba(13,71,161,0.5)" stroke-width="1"/>
    <line x1="-18" y1="5"  x2="-4" y2="4"   stroke="rgba(13,71,161,0.5)" stroke-width="1"/>
    <line x1="4"  y1="-6" x2="18" y2="-5" stroke="rgba(13,71,161,0.5)" stroke-width="1"/>
    <line x1="4"  y1="-1" x2="18" y2="0"  stroke="rgba(13,71,161,0.5)" stroke-width="1"/>
    <line x1="4"  y1="4"  x2="18" y2="5"  stroke="rgba(13,71,161,0.5)" stroke-width="1"/>
  </g>
</svg>
